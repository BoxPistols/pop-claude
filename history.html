<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Claude Guard — 実行履歴</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+JP:wght@400;500&display=swap');

  :root {
    --bg: #0D1117;
    --bg2: #161B22;
    --bg3: #21262D;
    --border: #30363D;
    --text: #E6EDF3;
    --text2: #8B949E;
    --green: #3FB950;
    --red: #F85149;
    --blue: #58A6FF;
    --orange: #FF6B35;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    padding: 16px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header h1 {
    font-size: 15px;
    font-weight: 700;
  }

  .stats {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text2);
  }

  .stat-approved { color: var(--green); }
  .stat-rejected { color: var(--red); }

  .table-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  thead {
    position: sticky;
    top: 0;
    background: var(--bg2);
    z-index: 1;
  }

  th {
    padding: 10px 16px;
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 10px 16px;
    border-bottom: 1px solid #21262D;
    vertical-align: middle;
  }

  tr:hover td { background: rgba(255,255,255,0.02); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
  }

  .badge-approved { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-rejected { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-auto { background: rgba(88,166,255,0.15); color: var(--blue); }

  .cmd-cell {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text2);
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .filter-bar {
    padding: 10px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }

  .filter-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
  }

  .filter-input:focus {
    border-color: var(--blue);
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🕒 実行履歴</h1>
  <div class="stats">
    <span>総計: <strong id="totalCount">0</strong></span>
    <span class="stat-approved">承認: <strong id="approvedCount">0</strong></span>
    <span class="stat-rejected">拒否: <strong id="rejectedCount">0</strong></span>
  </div>
</div>

<div class="filter-bar">
  <input class="filter-input" type="text" id="filterInput" placeholder="コマンドを検索..." oninput="filterHistory()">
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>時刻</th>
        <th>ツール</th>
        <th>コマンド</th>
        <th>判定</th>
        <th>方法</th>
      </tr>
    </thead>
    <tbody id="historyBody">
    </tbody>
  </table>
  <div class="empty" id="emptyMsg" style="display:none">履歴がありません</div>
</div>

<script>
const { ipcRenderer } = require('electron');

let allHistory = [];

ipcRenderer.on('history', (event, history) => {
  allHistory = history.reverse(); // 新しい順
  renderHistory(allHistory);
  updateStats(allHistory);
});

ipcRenderer.send('get-history');

function renderHistory(history) {
  const body = document.getElementById('historyBody');
  const empty = document.getElementById('emptyMsg');

  if (history.length === 0) {
    body.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  body.innerHTML = history.map(item => {
    const time = new Date(item.timestamp).toLocaleString('ja-JP', {
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    const cmd = item.command || item.tool_input?.command || JSON.stringify(item.tool_input || {});
    const tool = item.tool_name || item.tool || '-';
    const methodLabel = item.method === 'auto' ? 'auto' : 'user';

    return `
      <tr>
        <td style="font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text2); white-space:nowrap">${time}</td>
        <td style="font-family:'JetBrains Mono',monospace; font-size:11px;">${tool}</td>
        <td class="cmd-cell" title="${cmd}">${cmd}</td>
        <td>
          <span class="badge badge-${item.approved ? 'approved' : 'rejected'}">
            ${item.approved ? '✓ 承認' : '✕ 拒否'}
          </span>
        </td>
        <td>
          <span class="badge badge-${methodLabel}">
            ${methodLabel === 'auto' ? '⚡ 自動' : '👤 手動'}
          </span>
        </td>
      </tr>
    `;
  }).join('');
}

function updateStats(history) {
  document.getElementById('totalCount').textContent = history.length;
  document.getElementById('approvedCount').textContent = history.filter(h => h.approved).length;
  document.getElementById('rejectedCount').textContent = history.filter(h => !h.approved).length;
}

function filterHistory() {
  const query = document.getElementById('filterInput').value.toLowerCase();
  const filtered = allHistory.filter(item => {
    const cmd = (item.command || item.tool_input?.command || '').toLowerCase();
    const tool = (item.tool_name || item.tool || '').toLowerCase();
    return cmd.includes(query) || tool.includes(query);
  });
  renderHistory(filtered);
  updateStats(filtered);
}
</script>
</body>
</html>
